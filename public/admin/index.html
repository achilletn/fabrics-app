<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="/favicon.png">
<title>Tableau de bord — FabriCS</title>
<link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <header class="admin-header">
    <div class="admin-header-in">
      <a href="/admin/" class="brand" aria-label="FabriCS — administration">
        <img src="/emblem.png" alt="">
        <span class="brand-name">Fabri<b>CS</b></span>
        <span class="brand-context">Administration</span>
      </a>
      <div class="admin-header-actions">
        <span id="whoami" class="whoami"></span>
        <a href="/" class="site-link">Voir le site ↗</a>
        <button id="logout-btn" class="btn btn-sm btn-dark">Se déconnecter</button>
      </div>
    </div>
  </header>

  <main class="admin-shell">
    <div class="admin-grid">
      <section class="card" id="form-card">
        <div class="card-head">
          <p class="eyebrow">Publier</p>
          <h2 id="form-title">Nouvelle actualité</h2>
        </div>
        <div class="card-body">
          <form id="actu-form" class="form" novalidate>
            <input type="hidden" id="actu-id" value="">
            <div class="field">
              <label for="title">Titre</label>
              <input id="title" name="title" type="text" required maxlength="200">
            </div>
            <div class="field">
              <label for="excerpt">Texte</label>
              <textarea id="excerpt" name="excerpt" required maxlength="600" rows="4"></textarea>
            </div>
            <div class="field-row">
              <div class="field">
                <label for="sourceLabel">Source</label>
                <input id="sourceLabel" name="sourceLabel" type="text" maxlength="60" placeholder="LinkedIn, Instagram…">
              </div>
              <div class="field">
                <label for="publishedAt">Date de publication</label>
                <input id="publishedAt" name="publishedAt" type="date" required>
              </div>
            </div>
            <div class="field">
              <label for="sourceUrl">Lien vers la publication (optionnel)</label>
              <input id="sourceUrl" name="sourceUrl" type="url" maxlength="500" placeholder="https://…">
            </div>
            <div class="field">
              <label for="image">Image</label>
              <input id="image" name="image" type="file" accept="image/jpeg,image/png,image/webp">
              <p class="hint">JPG, PNG ou WebP — 5 Mo max.</p>
            </div>
            <p id="form-error" class="form-error hidden" role="alert"></p>
            <div class="form-actions">
              <button type="submit" class="btn btn-primary">Enregistrer</button>
              <button type="button" id="cancel-edit" class="btn hidden">Annuler</button>
            </div>
          </form>
        </div>
      </section>

      <section class="card">
        <div class="card-head">
          <p class="eyebrow">Journal de bord</p>
          <h2>Actualités publiées <span id="actu-count" class="count"></span></h2>
        </div>
        <ul id="actu-list-admin" class="admin-list"></ul>
      </section>
    </div>

    <div class="stack">
      <section class="card">
        <div class="card-head">
          <p class="eyebrow">Page Rejoindre</p>
          <h2>Messages de contact <span id="contact-count" class="count"></span></h2>
        </div>
        <ul id="contact-list-admin" class="admin-list"></ul>
      </section>
    </div>
  </main>

  <footer class="admin-foot">© FabriCS — Espace staff</footer>

  <script type="module" src="/js/admin.js"></script>
</body>
</html>
