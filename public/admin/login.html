<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="/favicon.png">
<title>Connexion staff — FabriCS</title>
<link rel="stylesheet" href="/css/admin.css">
</head>
<body class="login-body">
  <main class="login-card">
    <a href="/" class="brand" aria-label="FabriCS — retour au site">
      <img src="/emblem.png" alt="">
      <span class="brand-name">Fabri<b>CS</b></span>
    </a>
    <p class="eyebrow">Espace staff</p>
    <h1>Connexion</h1>
    <form id="login-form" class="form" novalidate>
      <div class="field">
        <label for="username">Identifiant</label>
        <input id="username" name="username" type="text" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="password">Mot de passe</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
      </div>
      <p id="login-error" class="form-error hidden" role="alert"></p>
      <button type="submit" class="btn btn-primary">Se connecter</button>
    </form>
    <p class="login-foot"><a href="/">← Retour au site</a></p>
  </main>
  <script type="module" src="/js/admin-login.js"></script>
</body>
</html>
