<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="/favicon.png">
<title>Connexion staff — FabriCS</title>
<link rel="stylesheet" href="/_astro/actualites.CJeE3WiQ.css">
</head>
<body class="min-h-screen flex items-center justify-center bg-paper px-6">
  <div class="w-full max-w-sm border border-line p-8">
    <h1 class="font-display text-2xl font-bold mb-6 text-ink">Espace staff FabriCS</h1>
    <form id="login-form" class="flex flex-col gap-4" novalidate>
      <div>
        <label for="username" class="block text-sm text-smoke mb-1">Identifiant</label>
        <input id="username" name="username" type="text" autocomplete="username" required
          class="w-full border border-line px-3 py-2 text-sm">
      </div>
      <div>
        <label for="password" class="block text-sm text-smoke mb-1">Mot de passe</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required
          class="w-full border border-line px-3 py-2 text-sm">
      </div>
      <p id="login-error" class="text-sm text-grenade hidden" role="alert"></p>
      <button type="submit"
        class="font-display text-sm px-5 py-2 border border-grenade text-grenade hover:bg-grenade hover:text-paper transition-colors duration-200">
        Se connecter
      </button>
    </form>
  </div>
  <script type="module" src="/js/admin-login.js"></script>
</body>
</html>
